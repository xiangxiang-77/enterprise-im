name: enterprise_im_flutter_client
description: Minimal Enterprise IM Flutter TCP client.
publish_to: "none"
version: 0.1.15+16

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  path: ^1.9.0
  sqflite: ^2.3.3
  camera_android: ^0.10.10+17
  file_picker: ^8.1.7
  http: ^1.2.0
  image: ^4.3.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  record: ^5.1.0
  audioplayers: ^6.1.0
  video_player: ^2.9.1

dependency_overrides:
  record_linux: 1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
