services:
  im-server:
    build:
      context: ./im-server
    image: enterprise-im-server:0.1.0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      coturn:
        condition: service_started
      asterisk:
        condition: service_started
      pjsip-gateway:
        condition: service_started
    environment:
      HTTP_PORT: ${HTTP_PORT:-8080}
      TCP_PORT: ${TCP_PORT:-9000}
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-enterprise_im}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      DB_USERNAME: ${DB_USERNAME:-${MYSQL_USER:-enterprise_im}}
      DB_PASSWORD: ${DB_PASSWORD:-${MYSQL_PASSWORD:-enterprise_im_dev}}
      DB_DRIVER: ${DB_DRIVER:-com.mysql.jdbc.Driver}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-enterprise-im}
      TURN_URL: ${TURN_URL:-turn:10.200.71.31:3478}
      TURN_USERNAME: ${TURN_USERNAME:-enterprise-im}
      TURN_PASSWORD: ${TURN_PASSWORD:-enterprise-im-secret}
      PJSIP_SIGNAL_URL: ${PJSIP_SIGNAL_URL:-http://pjsip-gateway:7070}
      SIP_DOMAIN: ${SIP_DOMAIN:-enterprise-im.local}
      SIP_REGISTRAR: ${SIP_REGISTRAR:-sip:127.0.0.1:5060}
      SIP_ANDROID_REGISTRAR: ${SIP_ANDROID_REGISTRAR:-sip:10.200.71.31:5060}
      SIP_REALM: ${SIP_REALM:-enterprise-im.local}
      SIP_PASSWORD: ${SIP_PASSWORD:-enterprise-im-sip-secret}
      DEMO_TOKEN_PREFIX: ${DEMO_TOKEN_PREFIX:-demo-token-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "${HTTP_PORT:-18080}:8080"
      - "${TCP_PORT:-19090}:9000"
    restart: unless-stopped

  pjsip-gateway:
    build:
      context: ./pjsip-gateway
    image: enterprise-im-pjsip-gateway:0.1.0
    environment:
      PJSIP_GATEWAY_PORT: 7070
      PJSUA_BIN: ${PJSUA_BIN:-/opt/pjsip/bin/pjsua}
      PJSIP_SIP_DOMAIN: ${PJSIP_SIP_DOMAIN:-enterprise-im.local}
      PJSIP_REGISTRAR: ${PJSIP_REGISTRAR:-sip:asterisk:5060}
      PJSIP_REALM: ${PJSIP_REALM:-enterprise-im.local}
      PJSIP_USERNAME: ${PJSIP_USERNAME:-u_gateway}
      PJSIP_PASSWORD: ${PJSIP_PASSWORD:-enterprise-im-sip-secret}
      PJSUA_EXTRA_ARGS: ${PJSUA_EXTRA_ARGS:-}
      PJSIP_CREATE_CMD: ${PJSIP_CREATE_CMD:-}
      PJSIP_ANSWER_CMD: ${PJSIP_ANSWER_CMD:-}
      PJSIP_HANGUP_CMD: ${PJSIP_HANGUP_CMD:-}
    ports:
      - "${PJSIP_GATEWAY_PORT:-7070}:7070"
    restart: unless-stopped

  asterisk:
    build:
      context: ./asterisk
    image: enterprise-im-asterisk:0.1.0
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
    ports:
      - "${SIP_PORT:-5060}:5060/udp"
      - "${SIP_PORT:-5060}:5060/tcp"
      - "${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10020}:${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10020}/udp"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enterprise_im}
      MYSQL_USER: ${MYSQL_USER:-enterprise_im}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-enterprise_im_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-enterprise_im_root}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-enterprise_im} -p${MYSQL_PASSWORD:-enterprise_im_dev} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9101}:9000"
      - "${MINIO_CONSOLE_PORT:-9102}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    command:
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM:-enterprise-im.local}
      - --user=${TURN_USERNAME:-enterprise-im}:${TURN_PASSWORD:-enterprise-im-secret}
      - --no-cli
      - --no-tls
      - --no-dtls
    ports:
      - "${TURN_PORT:-3478}:3478/tcp"
      - "${TURN_PORT:-3478}:3478/udp"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  minio-data:
